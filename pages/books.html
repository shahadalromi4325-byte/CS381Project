<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books Catalog – YIC Library</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/books.css">
</head>

<body>
  <!-- Background -->
  <img src="/assets/images/Video.webm" alt="library background" class="hero-gif">
  <div class="overlay"></div>

  <!-- Logo -->
  <div class="logo">
    <img src="/assets/images/logo.png" alt="YIC Library Logo" class="logo-img">
  </div>

  <!-- Profile Circle -->
  <!-- ✅ Fixed: removed broken profile dropdown (uses auth.js that doesn't exist) -->
  <!--           replaced with simple login link like index.html -->
  <div class="profile-circle">
    <a class="link" href="/pages/login.html">
      <i class="fas fa-user"></i>
    </a>
  </div>

  <!-- Navigation Bar -->
  <!-- ✅ Fixed: all hrefs corrected to use absolute /pages/ paths -->
  <nav class="nav-links">
    <ul>
      <li><a class="links" href="/index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a class="links active" href="/pages/books.html"><i class="fas fa-book"></i> Books</a></li>
      <li><a class="links" href="/pages/Ebooks.html"><i class="fas fa-book-reader"></i> E-Books</a></li>
      <li><a class="links" href="/index.html#services"><i class="fas fa-cogs"></i> Services</a></li>
      <li><a class="links" href="/pages/borrowed-books.html"><i class="fas fa-bookmark"></i> My Books</a></li>
    </ul>
  </nav>

  <!-- Catalog Container -->
  <div class="books-catalog-container">
    <h1><i class="fas fa-book"></i> Books Catalog</h1>

    <!-- Search & Filter Bar -->
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Search books by title, author, or ISBN..."
        class="search-input"
        onkeyup="filterBooks()"
      >
      <select id="categoryFilter" class="filter-select" onchange="filterBooks()">
        <option value="">All Categories</option>
        <option value="fiction">Fiction</option>
        <option value="reference">Reference</option>
        <option value="science">Science</option>
        <option value="biography">Biography</option>
        <option value="history">History</option>
      </select>
    </div>

    <div class="results-info">
      <span id="resultCount">Showing all books</span>
    </div>

    <!-- Books Grid -->
    <div class="books-grid" id="booksContainer"></div>

    <div id="noResults" class="no-results" style="display:none;">
      <p>No books found. Try adjusting your search or filter.</p>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="/assets/js/books.js"></script>
</body>
</html>
