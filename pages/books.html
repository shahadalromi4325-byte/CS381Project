        <div class="results-info">

        </div>

        <!-- Books Grid -->

            <!-- Books will be populated here by JavaScript -->
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            <p>No books found. Try adjusting your search or filter.</p>
        </div>
    </div>

    <!-- Scroll to Top Button -->

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            const noResults = document.getElementById('noResults');
            const resultCount = document.getElementById('resultCount');
            const user = JSON.parse(localStorage.getItem('currentUser'));

            container.innerHTML = '';

            if (books.length === 0) {
                noResults.style.display = 'block';
                resultCount.innerHTML = 'No books found';
                return;
            }

            noResults.style.display = 'none';
            resultCount.innerHTML = `Showing ${books.length} book(s)`;

            books.forEach(book => {
                const availabilityClass = book.available === 0 ? 'unavailable' : book.available <= 2 ? 'low' : '';
                const availabilityText = book.available === 0 ? 'Currently Unavailable' : 
                                        book.available <= 2 ? `${book.available} In Stock` : 'In Stock';
                
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <img src="${book.cover}" alt="${book.title} Cover" class="book-cover" onerror="this.src='https://via.placeholder.com/300x400?text=${encodeURIComponent(book.title)}'">
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">By: ${book.author}</div>
                        <div class="book-call-number">Call: ${book.callNumber}</div>
                        <div class="stock-info">${availabilityText}</div>
                        <span class="availability ${availabilityClass}">${availabilityText}</span>
                        ${user ? 
                            `<button class="borrow-btn" ${book.available === 0 ? 'disabled' : ''} onclick="borrowBook(${book.id}, '${book.title}')">
                                ${book.available === 0 ? '❌ Unavailable' : '📖 Borrow'}
                            </button>` 
                            : `<button class="borrow-btn" onclick="window.location.href='profile.html'">🔒 Log In</button>`
                        }
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function borrowBook(bookId, bookTitle) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'profile.html';
                return;
            }

            // Get borrowed books from localStorage
            let borrowedBooks = JSON.parse(localStorage.getItem('borrowedBooks')) || [];
            
            // Check if already borrowed
            if (borrowedBooks.find(b => b.id === bookId && b.userId === user.id)) {
                alert(`You have already borrowed "${bookTitle}"`);
                return;
            }

            // Add borrowed book with due date (14 days from now)
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 14);
            
            borrowedBooks.push({
                id: bookId,
                userId: user.id,
                title: bookTitle,
                borrowDate: new Date().toLocaleDateString(),
                dueDate: dueDate.toLocaleDateString()
            });

            localStorage.setItem('borrowedBooks', JSON.stringify(borrowedBooks));

            // Show success message
            showSuccessToast(`"${bookTitle}" has been added to your borrowed books!`);

            // Refresh display
            setTimeout(() => {
                filterBooks();
            }, 500);
        }

        function showSuccessToast(message) {
            const toast = document.createElement('div');
            toast.className = 'success-toast';
            toast.innerHTML = `✅ ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function filterBooks() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value.toLowerCase();

            const filtered = booksData.filter(book => {
                const matchesSearch = book.title.toLowerCase().includes(searchQuery) || 
                                    book.author.toLowerCase().includes(searchQuery) ||
                                    book.isbn.includes(searchQuery);
                const matchesCategory = !categoryFilter || book.category.toLowerCase() === categoryFilter;
                return matchesSearch && matchesCategory;
            });

            displayBooks(filtered);
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            displayBooks(booksData);
        });
