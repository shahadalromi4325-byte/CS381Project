<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Borrowed Books – YIC Library</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/borrowed-books.css">
</head>

<body>
  <!-- ✅ Fixed: replaced broken Unsplash URL with local gif (same as other pages) -->
  <img src="/assets/images/animation.gif" alt="library background" class="hero-gif">
  <div class="overlay"></div>

  <!-- Logo -->
  <div class="logo">
    <img src="/assets/images/logo.png" alt="YIC Library Logo" class="logo-img">
  </div>

  <!-- Profile Circle -->
  <div class="profile-circle">
    <a class="link" href="/pages/login.html">
      <i class="fas fa-user"></i>
    </a>
  </div>

  <!-- Navigation Bar -->
  <!-- ✅ Fixed: all hrefs use absolute /pages/ paths -->
  <nav class="nav-links">
    <ul>
      <li><a class="links" href="/index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a class="links" href="/pages/books.html"><i class="fas fa-book"></i> Books</a></li>
      <li><a class="links" href="/pages/Ebooks.html"><i class="fas fa-book-reader"></i> E-Books</a></li>
      <li><a class="links" href="/index.html#services"><i class="fas fa-cogs"></i> Services</a></li>
      <li><a class="links active" href="/pages/borrowed-books.html"><i class="fas fa-bookmark"></i> My Books</a></li>
    </ul>
  </nav>

  <!-- Borrowed Books Container -->
  <div id="borrowedContent" class="borrowed-container">
    <h1><i class="fas fa-book-reader"></i> My Borrowed Books</h1>
    <div class="borrowed-count">
      <span id="borrowCount">Loading...</span>
    </div>

    <div id="borrowedList" class="borrowed-list"></div>

    <div id="noBorrowed" class="no-borrowed" style="display:none;">
      <p>📭 You haven't borrowed any books yet.</p>
      <p>Visit the <a href="/pages/books.html">Books Catalog</a> to find and borrow books!</p>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="/assets/js/borrowed-books.js">
  </script>
</body>
</html>
